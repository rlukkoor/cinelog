<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinelog | Gemini Powered</title>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.run/@google/genai"
      }
    }
    </script>
    <style>
        /* Minimal styles to ensure visibility */
        body { background: #0d0d0d; color: #f0ede8; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #loadingOverlay { position: fixed; inset: 0; background: #0d0d0d; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .panel { flex: 1; border: 1px solid #333; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border-bottom: 1px solid #333; padding: 8px; text-align: left; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; background: #1e1e1e; }
        .ai { border-left: 3px solid #e8c97a; }
        input { width: 80%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; }
        button { padding: 10px; cursor: pointer; background: #e8c97a; border: none; }
    </style>
</head>
<body>

<div id="loadingOverlay"><h1>Loading Cinelog...</h1></div>

<div class="panel" id="dataPanel">
    <h2>Film Log</h2>
    <table>
        <thead><tr><th>Year</th><th>Movie</th><th>Director</th><th>Country</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="panel" id="chatPanel">
    <h2>Ask Gemini</h2>
    <div id="messages" style="height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
    <input type="text" id="chatInput" placeholder="Ask about your movies...">
    <button id="sendBtn">Ask</button>
</div>

<script type="module">
    import { GoogleGenAI } from "@google/genai";

    // --- PASTE YOUR KEY HERE ---
    const API_KEY = AIzaSyBAZVEbUIJ28jqT8lCUqWKEsvoruAADyn8; 
    
    let genAI, model, allRows = [];

    // Initialize Gemini safely
    try {
        if (API_KEY && API_KEY.length > 10) {
            genAI = new GoogleGenAI(API_KEY);
            model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            console.log("Gemini Initialized");
        }
    } catch (e) { console.error("Gemini Init Failed", e); }

    // Fetch Data
    async function loadData() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmUAAYiA6tSav8XI8TCX44vLWuTm1xawbCj9UMuupmBd1Avfa57arfa96O5RVMXZCNwEyL9oFUvD20/pub?gid=1935691887&single=true&output=csv";
        try {
            const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
            const text = await res.text();
            const lines = text.split('\n').slice(1);
            
            allRows = lines.map(line => {
                const parts = line.split(',');
                return { 
                    year: parts[0]?.replace(/"/g, ''), 
                    movie: parts[1]?.replace(/"/g, ''), 
                    director: parts[2]?.replace(/"/g, ''), 
                    country: parts[6]?.replace(/"/g, '') 
                };
            }).filter(r => r.movie && r.movie.length > 2);

            document.getElementById('tableBody').innerHTML = allRows.map(r => 
                `<tr><td>${r.year}</td><td>${r.movie}</td><td>${r.director}</td><td>${r.country}</td></tr>`
            ).join('');

            document.getElementById('loadingOverlay').style.display = 'none';
        } catch (e) {
            document.getElementById('loadingOverlay').innerHTML = "<h1>Error loading data. Check console.</h1>";
        }
    }

    // Chat Function
    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        const msg = input.value;
        if (!msg || !model) return;

        addMessage("You", msg);
        input.value = '';

        const context = allRows.slice(0, 50).map(r => `${r.movie} (${r.year}) by ${r.director}`).join(', ');
        const prompt = `Data: ${context}\n\nQuestion: ${msg}`;

        try {
            const result = await model.generateContent(prompt);
            addMessage("Gemini", result.response.text());
        } catch (e) {
            addMessage("Error", "Could not connect to Gemini. Check your API key.");
        }
    };

    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `msg ${sender === 'Gemini' ? 'ai' : ''}`;
        div.innerHTML = `<strong>${sender}:</strong> ${text}`;
        document.getElementById('messages').appendChild(div);
    }

    document.getElementById('sendBtn').onclick = window.sendMessage;
    loadData();
</script>

</body>
</html>
