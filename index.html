<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinelog | Film Archive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8c97a;
    --accent2: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); letter-spacing: 0.02em; }
  
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Data Panel (Left) ── */
  .data-panel {
    width: 62%; 
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .filter-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }

  /* ── Table Layout ── */
  .table-wrap {
    flex: 1;
    overflow: auto;
    background: var(--bg);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; 
  }
  thead { position: sticky; top: 0; background: var(--surface); z-index: 10; }
  th {
    text-align: left;
    padding: 12px 15px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 15px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Column Widths */
  .col-year { width: 65px; }
  .col-movie { width: 200px; }
  .col-dir { width: 140px; }
  .col-writer { width: 140px; }
  .col-cin { width: 140px; }
  .col-music { width: 140px; }
  .col-country { width: 110px; }

  tr:hover td { background: var(--surface2); }
  td.year-col { color: var(--accent); font-family: 'DM Mono', monospace; }

  /* ── Insights & Charts (Right) ── */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 14px; font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; color: var(--muted); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  .graph-wrap { flex: 1; overflow-y: auto; padding: 20px; }
  .bar-row { margin-bottom: 12px; }
  .bar-info { display: flex; justify-content: space-between; font-size: 11px; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; }
  .bar-fill { height: 100%; background: var(--accent2); border-radius: 3px; transition: width 0.6s ease-out; }

  /* ── Stats Bar ── */
  .stats-row { display: flex; border-top: 1px solid var(--border); background: var(--surface); }
  .stat { flex: 1; padding: 15px 20px; border-right: 1px solid var(--border); }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }

  .loading-overlay { position: absolute; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div style="font-family:'DM Serif Display'; font-size:32px; color:var(--accent)">Syncing Film Log...</div>
</div>

<div class="topbar">
  <div class="logo">Cinelog <span>Archive</span></div>
  <div id="rowCount" style="font-family:'DM Mono'; font-size:11px; color:var(--muted)">0 films logged</div>
</div>

<div class="layout">
  <div class="data-panel">
    <div class="filter-row">
      <input class="filter-input" id="searchInput" placeholder="Search keywords..." style="flex:1">
      <select class="filter-input" id="decadeSelect">
        <option value="">All Decades</option>
        <script>
          for(let y=2020; y>=1920; y-=10) document.write(`<option value="${y}">${y}s</option>`);
        </script>
      </select>
      <input class="filter-input" id="yearSingle" placeholder="Year" style="width:65px">
    </div>
    
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-year">Year</th>
            <th class="col-movie">Movie</th>
            <th class="col-dir">Director</th>
            <th class="col-writer">Screenwriter</th>
            <th class="col-cin">Cinematography</th>
            <th class="col-music">Music</th>
            <th class="col-country">Country</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="statMovies">0</div><div class="stat-label">Movies</div></div>
      <div class="stat"><div class="stat-val" id="statYears">0</div><div class="stat-label">Years</div></div>
      <div class="stat"><div class="stat-val" id="statCountries">0</div><div class="stat-label">Countries</div></div>
      <div class="stat"><div class="stat-val" id="statDirectors">0</div><div class="stat-label">Directors</div></div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="panel-tabs">
      <button class="tab-btn" onclick="switchTab('chatTab')">Chat</button>
      <button class="tab-btn active" onclick="switchTab('graphTab')">Visual Insights</button>
    </div>

    <div class="panel-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div id="graphTab" class="tab-pane active" style="display:flex; flex-direction:column; height:100%;">
        <div class="filter-row" style="background:var(--surface)">
          <select class="filter-input" id="graphColumn" onchange="renderAll()" style="flex:2">
            <option value="director">Top Directors</option>
            <option value="screenwriter">Top Screenwriters</option>
            <option value="cinematography">Top Cinematographers</option>
            <option value="music">Top Composers</option>
            <option value="country">Top Countries</option>
            <option value="decade">Films by Decade</option>
          </select>
          <select class="filter-input" id="graphLimit" onchange="renderAll()" style="flex:1">
            <option value="10">Top 10</option>
            <option value="25" selected>Top 25</option>
            <option value="50">Top 50</option>
            <option value="0">Show All</option>
          </select>
        </div>
        <div class="graph-wrap" id="chartContainer"></div>
      </div>
      <div id="chatTab" class="tab-pane" style="display:none; padding:20px; color:var(--muted); font-family:'DM Mono'">
        Analysis Module Ready.
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmUAAYiA6tSav8XI8TCX44vLWuTm1xawbCj9UMuupmBd1Avfa57arfa96O5RVMXZCNwEyL9oFUvD20/pub?gid=1935691887&single=true&output=csv";
let allRows = [];

async function loadData() {
  try {
    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(SHEET_URL)}`);
    const text = await res.text();
    allRows = cleanRows(parseCSV(text));
    renderAll();
    document.getElementById('loadingOverlay').style.display = 'none';
  } catch (e) { console.error("Sync error", e); }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function cleanRows(rows) {
  let lastYear = '';
  return rows.map(r => {
    const movie = r['Movie']?.replace(/^"|"$/g, '').trim();
    if (!movie || movie.match(/^\d+$/)) return null;
    const rawYear = r['Year']?.trim();
    if (rawYear && !isNaN(parseInt(rawYear))) lastYear = parseInt(rawYear);
    return {
      year: lastYear,
      movie: movie,
      director: r['Director'] || '—',
      screenwriter: r['Screenwriter'] || '—',
      cinematography: r['Cinematography'] || '—',
      music: r['Music'] || '—',
      country: r['Country'] || '—',
      decade: Math.floor(lastYear / 10) * 10
    };
  }).filter(Boolean);
}

function renderAll() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const decade = document.getElementById('decadeSelect').value;
  const single = document.getElementById('yearSingle').value.trim();

  const filtered = allRows.filter(r => {
    const matchSearch = Object.values(r).some(v => String(v).toLowerCase().includes(search));
    const matchDecade = !decade || r.decade == decade;
    const matchYear = !single || r.year == single;
    return matchSearch && matchDecade && matchYear;
  });

  // Master update
  document.getElementById('tableBody').innerHTML = filtered.map(r => `
    <tr>
      <td class="year-col">${r.year}</td>
      <td style="font-weight:500; color:var(--accent)">${r.movie}</td>
      <td>${r.director}</td>
      <td>${r.screenwriter}</td>
      <td>${r.cinematography}</td>
      <td>${r.music}</td>
      <td style="color:var(--muted); font-size:11px">${r.country}</td>
    </tr>`).join('');

  const countrySet = new Set();
  const directorSet = new Set();
  const yearSet = new Set();

  filtered.forEach(r => {
    if (r.country && r.country !== '—') r.country.split(',').forEach(c => countrySet.add(c.trim()));
    if (r.director && r.director !== '—') r.director.split(',').forEach(d => directorSet.add(d.trim()));
    if (r.year) yearSet.add(r.year);
  });

  document.getElementById('rowCount').textContent = `${filtered.length} films`;
  document.getElementById('statMovies').textContent = filtered.length;
  document.getElementById('statYears').textContent = yearSet.size;
  document.getElementById('statCountries').textContent = countrySet.size;
  document.getElementById('statDirectors').textContent = directorSet.size;
  
  generateChart(filtered);
}

function generateChart(data) {
  const column = document.getElementById('graphColumn').value;
  const limit = parseInt(document.getElementById('graphLimit').value);
  const counts = {};
  
  data.forEach(r => {
    let val = column === 'decade' ? `${r.decade}s` : r[column];
    if (!val || val === '—') return;
    val.split(',').forEach(p => {
      const name = p.trim();
      counts[name] = (counts[name] || 0) + 1;
    });
  });

  let items = Object.entries(counts).sort((a,b) => {
    // If decades, sort chronologically
    if (column === 'decade') return parseInt(a[0]) - parseInt(b[0]);
    // Otherwise sort by count, then by last name
    if (b[1] !== a[1]) return b[1] - a[1];
    const getSortKey = (s) => s.split(' ').pop().toLowerCase();
    return getSortKey(a[0]).localeCompare(getSortKey(b[0]));
  });

  // Apply limit if specified (unless it's decades, usually best to see all decades)
  if (limit > 0 && column !== 'decade') {
    items = items.slice(0, limit);
  }

  const max = Math.max(...items.map(i => i[1]), 1);

  document.getElementById('chartContainer').innerHTML = items.map(([label, count]) => `
    <div class="bar-row">
      <div class="bar-info"><span>${label}</span><span>${count}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${(count/max)*100}%"></div></div>
    </div>`).join('');
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-pane').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).style.display = 'block';
  event.currentTarget.classList.add('active');
  if(tabId === 'graphTab') renderAll();
}

['searchInput', 'decadeSelect', 'yearSingle'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderAll);
});

loadData();
</script>
</body>
</html>
