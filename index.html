  {
    "imports": {
      "@google/genai": "https://esm.run/@google/genai"
    }
  }
</script>

<script type="module">
import { GoogleGenAI } from "@google/genai";

// ── 1. CONFIGURATION (PASTE KEY HERE) ──
const API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE";

// ── 2. INITIALIZE GEMINI ──
let geminiModel = null;
if (API_KEY && API_KEY !== "PASTE_YOUR_GEMINI_API_KEY_HERE") {
  const genAI = new GoogleGenAI(API_KEY);
  geminiModel = genAI.getGenerativeModel({ 
    model: "gemini-1.5-flash",
    systemInstruction: "You are a film data analyst. Use the provided log to answer questions concisely. Use **bold** for key names/numbers."
  });
}

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmUAAYiA6tSav8XI8TCX44vLWuTm1xawbCj9UMuupmBd1Avfa57arfa96O5RVMXZCNwEyL9oFUvD20/pub?gid=1935691887&single=true&output=csv";
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

let allRows = [];
let filteredRows = [];
let isFirstLoad = true;
let chatHistory = [];

// ── DATA LOADING LOGIC ──
async function loadData() {
  if (isFirstLoad) document.getElementById('loadingText').textContent = 'Fetching your film log...';
  let text = null;
  for (const proxyFn of PROXIES) {
    try {
      const res = await fetch(proxyFn(SHEET_URL));
      if (!res.ok) continue;
      const buf = await res.arrayBuffer();
      text = new TextDecoder('utf-8').decode(buf);
      if (text && text.includes(',')) break;
    } catch (e) { continue; }
  }

  if (!text) {
    if (isFirstLoad) {
      document.getElementById('loadingText').textContent = 'Failed to load sheet.';
      document.getElementById('loadingOverlay').style.display = 'none';
    }
    return;
  }

  const rows = parseCSV(text);
  allRows = cleanRows(rows);
  renderTable(allRows);
  updateStats(allRows);
  
  if (isFirstLoad) {
    document.getElementById('loadingOverlay').style.display = 'none';
    isFirstLoad = false;
  }
  
  const pill = document.getElementById('statusPill');
  pill.textContent = `${allRows.length} films · updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
  pill.className = 'status-pill loaded';
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) { if (c === '"') inQ = !inQ; else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; } else cur += c; }
    vals.push(cur.trim());
    const obj = {}; headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function cleanRows(rows) {
  let lastYear = '';
  return rows.map(r => {
    const rawYear = r['Year']?.replace(/^"|"$/g, '').trim() || '';
    if (rawYear.toLowerCase().includes('total')) return null;
    const yearNum = parseInt(rawYear);
    if (!isNaN(yearNum)) lastYear = yearNum;
    const movie = r['Movie']?.replace(/^"|"$/g, '').trim() || '';
    if (!movie || movie.toLowerCase().includes("no movies logged")) return null;
    return {
      year: lastYear, movie,
      director: r['Director']?.replace(/^"|"$/g, '').trim() || '',
      screenwriter: r['Screenwriter']?.replace(/^"|"$/g, '').trim() || '',
      cinematography: r['Cinematography']?.replace(/^"|"$/g, '').trim() || '',
      music: r['Music']?.replace(/^"|"$/g, '').trim() || '',
      country: r['Country']?.replace(/^"|"$/g, '').trim() || ''
    };
  }).filter(Boolean);
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="year-col">${r.year}</td>
      <td><strong>${r.movie}</strong></td>
      <td>${r.director || '—'}</td>
      <td>${r.screenwriter || '—'}</td>
      <td>${r.cinematography || '—'}</td>
      <td>${r.music || '—'}</td>
      <td class="country-col">${r.country}</td>
    </tr>`).join('');
  document.getElementById('rowCount').textContent = `${rows.length} rows`;
}

function updateStats(rows) {
  document.getElementById('statMovies').textContent = rows.length;
  document.getElementById('statYears').textContent = new Set(rows.map(r => r.year)).size;
  document.getElementById('statDirectors').textContent = new Set(rows.map(r => r.director)).size;
  const cSet = new Set();
  rows.forEach(r => r.country.split(',').forEach(c => cSet.add(c.trim())));
  document.getElementById('statCountries').textContent = cSet.size;
}

// ── 3. UPDATED GEMINI CHAT LOGIC ──

window.sendMessage = async function(overrideText) {
  const input = document.getElementById('chatInput');
  const question = overrideText || input.value.trim();
  if (!question || allRows.length === 0) return;

  if (!geminiModel) {
    addMessage('ai', "Error: Gemini API Key is missing. Please enter your key in the script.");
    return;
  }

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', question);
  addTyping();

  const dataContext = allRows.map(r => `${r.year}|${r.movie}|${r.director}|${r.country}`).join('\n');
  const prompt = `Film Log:\n${dataContext}\n\nUser Question: ${question}`;

  try {
    const chat = geminiModel.startChat({ history: chatHistory });
    const result = await chat.sendMessage(prompt);
    const response = await result.response;
    const text = response.text();

    chatHistory.push({ role: "user", parts: [{ text: prompt }] });
    chatHistory.push({ role: "model", parts: [{ text: text }] });

    removeTyping();
    addMessage('ai', text);
  } catch (e) {
    removeTyping();
    addMessage('ai', "Error: " + e.message);
  }
  document.getElementById('sendBtn').disabled = false;
};

window.askSuggestion = (btn) => window.sendMessage(btn.textContent);

// Helper functions for UI
function addMessage(role, text) {
  const empty = document.getElementById('emptyState'); if (empty) empty.remove();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="msg-label ${role === 'ai' ? 'ai' : ''}">${role === 'ai' ? 'Gemini' : 'You'}</div>
                   <div class="msg-bubble ${role}">${text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg'; div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-label ai">Gemini</div>
                   <div class="msg-bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
});

loadData();
</script>
