<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinelog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --muted: #888; --accent: #e8c97a;
    --accent2: #c9a84c; --danger: #e87a7a; --success: #7ae8b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); letter-spacing: 0.02em; }
  .logo span { font-style: italic; color: var(--muted); font-size: 13px; margin-left: 8px; font-family: 'DM Sans', sans-serif; }
  .status-pill { font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border2); color: var(--muted); }
  .status-pill.loaded { border-color: var(--success); color: var(--success); }

  .layout { display: flex; flex: 1; overflow: hidden; }
  .data-panel { width: 55%; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-title { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  
  .filter-row { display: flex; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .filter-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .filter-input:focus { border-color: var(--accent2); }
  select.filter-input { cursor: pointer; color: var(--muted); width: 130px; }

  .table-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .table-wrap::-webkit-scrollbar { width: 4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
  thead { position: sticky; top: 0; background: var(--surface); z-index: 2; }
  th { text-align: left; padding: 10px 15px; font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 400; }
  td { padding: 8px 15px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tr:hover td { background: var(--surface2); }
  td.year-col { font-family: 'DM Mono', monospace; color: var(--accent); }
  .empty-row { font-style: italic; color: var(--muted); opacity: 0.7; }

  .stats-row { display: flex; border-top: 1px solid var(--border); flex-shrink: 0; }
  .stat { flex: 1; padding: 10px 15px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); }
  .stat-label { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }

  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .loading-overlay { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
  .logo-big { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--accent); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="logo-big">Cinelog</div>
  <div id="loadingText" style="font-family:'DM Mono'; font-size:12px; color:var(--muted); margin-top:10px;">Connecting to Google...</div>
</div>

<div class="topbar">
  <div class="logo">Cinelog <span>film log analyst</span></div>
  <div class="status-pill" id="statusPill">waiting...</div>
</div>

<div class="layout">
  <div class="data-panel">
    <div class="panel-header">
      <span class="panel-title">Film log</span>
      <span id="rowCount" style="font-family:'DM Mono'; color:var(--muted)">—</span>
    </div>
    
    <div class="filter-row">
      <select class="filter-input" id="categorySelect" onchange="applyFilter()">
        <option value="all">All Fields</option>
        <option value="movie">Movie</option>
        <option value="director">Director</option>
        <option value="screenwriter">Writer</option>
        <option value="cinematography">Camera</option>
        <option value="music">Music</option>
        <option value="country">Country</option>
      </select>
      <input class="filter-input" id="searchInput" placeholder="Search entries..." oninput="applyFilter()" style="flex:1" />
      <input class="filter-input" id="yearSearch" placeholder="Year" oninput="applyFilter()" style="width:70px" />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:50px">Year</th>
            <th>Movie</th>
            <th>Director</th>
            <th>Writer</th>
            <th>Camera</th>
            <th>Music</th>
            <th style="width:80px">Country</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="statMovies">0</div><div class="stat-label">Movies</div></div>
      <div class="stat"><div class="stat-val" id="statDirectors">0</div><div class="stat-label">Directors</div></div>
      <div class="stat"><div class="stat-val" id="statCountries">0</div><div class="stat-label">Countries</div></div>
      <div class="stat"><div class="stat-val" id="statYears">0</div><div class="stat-label">Years</div></div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="panel-header"><span class="panel-title">Ask about your data</span></div>
    <div class="messages" id="messages"></div>
    <div class="input-row" style="padding:12px 20px; border-top:1px solid var(--border)">
      <input class="filter-input" placeholder="Chat feature (Claude API required)..." disabled style="flex:1" />
    </div>
  </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmUAAYiA6tSav8XI8TCX44vLWuTm1xawbCj9UMuupmBd1Avfa57arfa96O5RVMXZCNwEyL9oFUvD20/pub?gid=1935691887&single=true&output=csv";

const PROXIES = [
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

let allData = [];

async function loadData() {
  const pill = document.getElementById('statusPill');
  const loadingText = document.getElementById('loadingText');
  let text = null;

  for (const proxyFn of PROXIES) {
    try {
      const res = await fetch(proxyFn(SHEET_URL));
      if (!res.ok) throw new Error('Proxy error');
      text = await res.text();
      if (text && text.includes(',')) break;
    } catch (e) { console.warn("Retrying proxy..."); }
  }

  if (text) {
    allData = parseCSV(text);
    renderTable(allData);
    updateStats(allData);
    document.getElementById('loadingOverlay').style.display = 'none';
    pill.textContent = 'Live Data Active';
    pill.classList.add('loaded');
  } else {
    loadingText.innerHTML = "Connection Error. Check Sheet settings.";
  }
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim() !== '');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
  
  let lastYearFound = "";

  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
    const obj = {};
    headers.forEach((h, i) => {
      if (h === 'year') {
          if (values[i] && values[i].trim() !== "") lastYearFound = values[i];
          obj['year'] = lastYearFound;
      } else {
          obj[h] = values[i] || '';
      }
    });
    return obj;
  });
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(r => {
    const isEntryEmpty = !r.movie || r.movie.trim() === "";
    return `
      <tr class="${isEntryEmpty ? 'empty-row' : ''}">
        <td class="year-col">${r.year || ''}</td>
        <td>${isEntryEmpty ? 'No movies logged yet' : `<strong>${r.movie}</strong>`}</td>
        <td>${r.director || ''}</td>
        <td>${r.screenwriter || ''}</td>
        <td>${r.cinematography || ''}</td>
        <td>${r.music || ''}</td>
        <td style="color:var(--muted); font-size:10px">${r.country || ''}</td>
      </tr>
    `;
  }).join('');
  
  // Update count based on actual movies logged
  const activeEntries = rows.filter(r => r.movie && r.movie.trim() !== "").length;
  document.getElementById('rowCount').textContent = `${activeEntries} LOGGED`;
}

function updateStats(rows) {
  // Only count rows where a movie name exists
  const activeRows = rows.filter(r => r.movie && r.movie.trim() !== "");

  document.getElementById('statMovies').textContent = activeRows.length;
  document.getElementById('statYears').textContent = new Set(activeRows.map(r => r.year)).size;
  document.getElementById('statDirectors').textContent = new Set(activeRows.map(r => r.director).filter(Boolean)).size;

  const individualCountries = new Set();
  activeRows.forEach(r => {
    if (r.country) {
      r.country.split(',').map(c => c.trim()).filter(Boolean).forEach(c => individualCountries.add(c));
    }
  });
  document.getElementById('statCountries').textContent = individualCountries.size;
}

function applyFilter() {
  const category = document.getElementById('categorySelect').value;
  const searchText = document.getElementById('searchInput').value.toLowerCase();
  const yearText = document.getElementById('yearSearch').value.toLowerCase();

  const filtered = allData.filter(r => {
    const matchesYear = String(r.year).toLowerCase().includes(yearText);
    let matchesSearch = false;
    if (category === 'all') {
      matchesSearch = Object.values(r).some(val => String(val).toLowerCase().includes(searchText));
    } else {
      matchesSearch = String(r[category]).toLowerCase().includes(searchText);
    }
    return matchesYear && matchesSearch;
  });
  renderTable(filtered);
}

loadData();
</script>
</body>
</html>
