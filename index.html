<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinelog | Film Archive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8c97a;
    --accent2: #c9a84c;
    --danger: #ff4d4d;
    --empty: rgba(255,255,255,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); letter-spacing: 0.02em; }
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Data Panel (Left) ── */
  .data-panel { width: 62%; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .filter-row { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .filter-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: var(--text); font-size: 12px; outline: none; }
  .clear-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }
  
  .back-btn { background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 10px; padding: 6px 10px; border-radius: 4px; cursor: pointer; display: none; }
  .back-btn:hover { background: var(--accent); color: var(--bg); }

  /* ── Table Layout ── */
  .table-wrap { flex: 1; overflow: auto; background: var(--bg); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead { position: sticky; top: 0; background: var(--surface); z-index: 10; }
  th { text-align: left; padding: 12px 15px; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 10px 15px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .col-year { width: 65px; } .col-movie { width: 200px; } .col-dir { width: 140px; } .col-writer { width: 140px; } .col-cin { width: 140px; } .col-music { width: 140px; } .col-country { width: 110px; }
  tr:hover td { background: var(--surface2); }
  td.year-col { color: var(--accent); font-family: 'DM Mono', monospace; }

  /* ── Insights & Charts ── */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 14px; font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; color: var(--muted); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  .graph-wrap { flex: 1; overflow-y: auto; padding: 20px; }
  .bar-row { margin-bottom: 12px; cursor: pointer; }
  .bar-row.no-click { cursor: default; pointer-events: none; opacity: 0.3; }
  .bar-row:not(.no-click):hover .bar-info { color: var(--accent); }
  .bar-row:not(.no-click):hover .bar-fill:not(.zero) { background: var(--accent); }
  
  .bar-info { display: flex; justify-content: space-between; font-size: 11px; font-family: 'DM Mono', monospace; margin-bottom: 4px; transition: color 0.2s; }
  .bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; }
  .bar-fill { height: 100%; background: var(--accent2); border-radius: 3px; transition: width 0.6s ease-out, background 0.2s; }
  .bar-fill.zero { background: var(--empty); }

  /* ── Stats Bar ── */
  .stats-row { display: flex; border-top: 1px solid var(--border); background: var(--surface); }
  .stat { flex: 1; padding: 15px 20px; border-right: 1px solid var(--border); }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }

  .loading-overlay { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 10px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div style="font-family:'DM Serif Display'; font-size:32px; color:var(--accent)">Syncing Archive...</div>
</div>

<div class="topbar">
  <div class="logo">Cinelog <span>Archive</span></div>
  <div id="rowCount" style="font-family:'DM Mono'; font-size:11px; color:var(--muted)">0 films logged</div>
</div>

<div class="layout">
  <div class="data-panel">
    <div class="filter-row">
      <input class="filter-input" id="searchInput" placeholder="Search movies, directors..." style="flex:1">
      <select class="filter-input" id="decadeSelect">
        <option value="">All Decades</option>
        <script>for(let y=2020; y>=1920; y-=10) document.write(`<option value="${y}">${y}s</option>`);</script>
      </select>
      <input class="filter-input" id="yearSingle" placeholder="Year" style="width:65px">
      <button class="clear-btn" onclick="clearFilters()">Clear All</button>
    </div>
    
    <div class="table-wrap">
      <table>
        <thead><tr><th class="col-year">Year</th><th class="col-movie">Movie</th><th class="col-dir">Director</th><th class="col-writer">Writer</th><th class="col-cin">Cinematography</th><th class="col-music">Music</th><th class="col-country">Country</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="statMovies">0</div><div class="stat-label">Movies</div></div>
      <div class="stat"><div class="stat-val" id="statYears">0</div><div class="stat-label">Years</div></div>
      <div class="stat"><div class="stat-val" id="statCountries">0</div><div class="stat-label">Countries</div></div>
      <div class="stat"><div class="stat-val" id="statDirectors">0</div><div class="stat-label">Directors</div></div>
    </div>
  </div>

  <div class="chat-panel">
    <div class="panel-tabs">
      <button class="tab-btn" onclick="switchTab('chatTab')">Chat</button>
      <button class="tab-btn active" onclick="switchTab('graphTab')">Visual Insights</button>
    </div>
    <div class="panel-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div id="graphTab" class="tab-pane active" style="display:flex; flex-direction:column; height:100%;">
        <div class="filter-row" style="background:var(--surface); flex-wrap: wrap;">
          <select class="filter-input" id="graphColumn" onchange="toggleSortUI(); renderAll()" style="flex:2">
            <option value="director">Top Directors</option>
            <option value="screenwriter">Top Screenwriters</option>
            <option value="cinematography">Top Cinematographers</option>
            <option value="music">Top Composers</option>
            <option value="country">Top Countries</option>
            <option value="decade">By Decade</option>
            <option value="year">By Individual Year</option>
          </select>
          <select class="filter-input" id="graphSort" onchange="renderAll()" style="flex:1;">
            <option value="chron">Timeline</option>
            <option value="vol" selected>By Volume</option>
          </select>
          <select class="filter-input" id="graphLimit" onchange="renderAll()" style="flex:1">
            <option value="10">Top 10</option><option value="25" selected>Top 25</option><option value="0">Show All</option>
          </select>
          <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
        </div>
        <div class="graph-wrap" id="chartContainer"></div>
      </div>
      <div id="chatTab" class="tab-pane" style="display:none; padding:20px; color:var(--muted); font-family:'DM Mono'">Archive analysis module active.</div>
    </div>
  </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmUAAYiA6tSav8XI8TCX44vLWuTm1xawbCj9UMuupmBd1Avfa57arfa96O5RVMXZCNwEyL9oFUvD20/pub?gid=1935691887&single=true&output=csv";
const PROXIES = [url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, url => `https://corsproxy.io/?${encodeURIComponent(url)}` ];
let allRows = [];
let historyStack = [];

async function loadData() {
  const overlay = document.getElementById('loadingOverlay');
  for (let proxyFn of PROXIES) {
    try {
      const res = await fetch(proxyFn(SHEET_URL), { signal: AbortSignal.timeout(8000) });
      const text = await res.text();
      allRows = cleanRows(parseCSV(text));
      if (allRows.length > 0) { renderAll(); overlay.style.display = 'none'; return; }
    } catch (e) { console.warn("Trying next proxy..."); }
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) { if (c === '"') inQ = !inQ; else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; } else cur += c; }
    vals.push(cur.trim());
    const obj = {}; headers.forEach((h, i) => obj[h] = vals[i] || ''); return obj;
  });
}

function cleanRows(rows) {
  let lastYear = '';
  return rows.map(r => {
    const movie = r['Movie']?.replace(/^"|"$/g, '').trim();
    if (!movie || movie.match(/^\d+$/)) return null;
    const rawYear = r['Year']?.trim();
    if (rawYear && !isNaN(parseInt(rawYear))) lastYear = parseInt(rawYear);
    return { year: lastYear, movie: movie, director: r['Director'] || '—', screenwriter: r['Screenwriter'] || '—', cinematography: r['Cinematography'] || '—', music: r['Music'] || '—', country: r['Country'] || '—', decade: Math.floor(lastYear / 10) * 10 };
  }).filter(Boolean);
}

function toggleSortUI() {
  const col = document.getElementById('graphColumn').value;
  const sortUI = document.getElementById('graphSort');
  sortUI.style.display = (col === 'year' || col === 'decade') ? 'block' : 'none';
}

function saveState() {
  historyStack.push({
    search: document.getElementById('searchInput').value,
    decade: document.getElementById('decadeSelect').value,
    year: document.getElementById('yearSingle').value
  });
  document.getElementById('backBtn').style.display = 'block';
}

function goBack() {
  if (historyStack.length === 0) return;
  const lastState = historyStack.pop();
  document.getElementById('searchInput').value = lastState.search;
  document.getElementById('decadeSelect').value = lastState.decade;
  document.getElementById('yearSingle').value = lastState.year;
  if (historyStack.length === 0) document.getElementById('backBtn').style.display = 'none';
  renderAll(true);
}

function applyFilter(label) {
  saveState();
  const col = document.getElementById('graphColumn').value;
  if (col === 'year') {
    document.getElementById('yearSingle').value = label;
    document.getElementById('decadeSelect').value = '';
    document.getElementById('searchInput').value = '';
  } else if (col === 'decade') {
    document.getElementById('decadeSelect').value = label.replace('s', '');
    document.getElementById('yearSingle').value = '';
    document.getElementById('searchInput').value = '';
  } else {
    document.getElementById('searchInput').value = label;
    document.getElementById('decadeSelect').value = '';
    document.getElementById('yearSingle').value = '';
  }
  renderAll(true);
}

function renderAll(skipHistory = false) {
  const searchStr = document.getElementById('searchInput').value.toLowerCase();
  const decade = document.getElementById('decadeSelect').value;
  const single = document.getElementById('yearSingle').value.trim();

  const filtered = allRows.filter(r => {
    const matchSearch = Object.keys(r).some(k => (k !== 'year' && k !== 'decade') && String(r[k]).toLowerCase().includes(searchStr));
    return matchSearch && (!decade || r.decade == decade) && (!single || r.year == single);
  });

  document.getElementById('tableBody').innerHTML = filtered.map(r => `<tr><td class="year-col">${r.year}</td><td style="font-weight:500; color:var(--accent)">${r.movie}</td><td>${r.director}</td><td>${r.screenwriter}</td><td>${r.cinematography}</td><td>${r.music}</td><td style="color:var(--muted); font-size:11px">${r.country}</td></tr>`).join('');
  
  const sets = { countries: new Set(), directors: new Set(), years: new Set() };
  filtered.forEach(r => {
    if (r.country !== '—') r.country.split(',').forEach(c => sets.countries.add(c.trim()));
    if (r.director !== '—') r.director.split(',').forEach(d => sets.directors.add(d.trim()));
    if (r.year) sets.years.add(r.year);
  });

  document.getElementById('statMovies').textContent = filtered.length;
  document.getElementById('statYears').textContent = sets.years.size;
  document.getElementById('statCountries').textContent = sets.countries.size;
  document.getElementById('statDirectors').textContent = sets.directors.size;
  document.getElementById('rowCount').textContent = `${filtered.length} films`;
  generateChart(filtered);
}

function generateChart(data) {
  const col = document.getElementById('graphColumn').value;
  const sortType = document.getElementById('graphSort').value;
  const limit = parseInt(document.getElementById('graphLimit').value);
  const counts = {};
  
  let minYear = 2026; 
  allRows.forEach(r => { if(r.year < minYear) minYear = r.year; });
  const currentYear = new Date().getFullYear();

  data.forEach(r => {
    let val = col === 'decade' ? `${r.decade}s` : (col === 'year' ? r.year : r[col]);
    if (!val || val === '—') return;
    String(val).split(',').forEach(p => { const n = p.trim(); counts[n] = (counts[n] || 0) + 1; });
  });

  if ((col === 'year' || col === 'decade') && sortType === 'chron') {
    if (col === 'year') {
      for (let y = minYear; y <= currentYear; y++) if (!counts[y]) counts[y] = 0;
    } else {
        const minDecade = Math.floor(minYear / 10) * 10;
        const curDecade = Math.floor(currentYear / 10) * 10;
        for (let d = minDecade; d <= curDecade; d += 10) if (!counts[`${d}s`]) counts[`${d}s`] = 0;
    }
  }

  let items = Object.entries(counts).sort((a,b) => {
    if ((col === 'year' || col === 'decade') && sortType === 'chron') return parseInt(a[0]) - parseInt(b[0]);
    if (b[1] !== a[1]) return b[1] - a[1];
    return a[0].split(' ').pop().localeCompare(b[0].split(' ').pop());
  });

  if (limit > 0) items = items.slice(0, limit);
  const max = Math.max(...items.map(i => i[1]), 1);

  document.getElementById('chartContainer').innerHTML = items.map(([l, c]) => {
    const isClickable = c > 0;
    const clickAttr = isClickable ? `onclick="applyFilter('${l.replace(/'/g, "\\'")}')"` : '';
    const classAttr = isClickable ? 'bar-row' : 'bar-row no-click';
    return `
      <div class="${classAttr}" ${clickAttr}>
        <div class="bar-info"><span>${l}</span><span>${c}</span></div>
        <div class="bar-bg"><div class="bar-fill ${c === 0 ? 'zero' : ''}" style="width:${(Math.max(c, 0.1)/max)*100}%"></div></div>
      </div>`;
  }).join('');
}

function clearFilters() {
  historyStack = [];
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('decadeSelect').value = '';
  document.getElementById('yearSingle').value = '';
  renderAll();
}

function switchTab(t) {
  document.querySelectorAll('.tab-pane').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(t).style.display = 'flex';
  event.currentTarget.classList.add('active');
  if(t === 'graphTab') renderAll();
}

['searchInput', 'decadeSelect', 'yearSingle'].forEach(id => document.getElementById(id).addEventListener('input', () => {
    renderAll();
}));
loadData();
</script>
</body>
</html>
